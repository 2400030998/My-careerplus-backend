# JWT Configuration
app.jwt.secret=mycareerplussecretkey2024verylongandsecurekey
app.jwt.expiration=86400000

# Frontend URL (CORS)
app.frontend.url=http://localhost:5173

# Logging
logging.level.org.springframework.web=DEBUG
logging.level.com.mycareer=DEBUG